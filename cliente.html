<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Portal — NORLAB</title>
<!-- Redirect automático al nuevo portal unificado -->
<meta http-equiv="refresh" content="0; url=https://norlab.xyz/portal/">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif,system-ui;background:#0F2430;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:#fff;border-radius:20px;padding:48px 40px;text-align:center;max-width:400px;width:100%;}
  .logo-text{font-size:22px;font-weight:700;color:#1A3A4A;letter-spacing:.05em;margin-bottom:8px;}
  .logo-dot{color:#4AB8C8;}
  p{color:#4A6B7A;font-size:15px;line-height:1.6;margin:16px 0 24px;}
  .btn{display:inline-block;padding:13px 28px;background:linear-gradient(135deg,#2D7EA8,#2A5870);color:#fff;text-decoration:none;border-radius:10px;font-size:15px;font-weight:600;}
  .spinner-wrap{display:flex;justify-content:center;margin:20px 0;}
  .spinner{width:36px;height:36px;border:3px solid rgba(45,126,168,.2);border-top-color:#2D7EA8;border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="card">
  <div class="logo-text">NOR<span class="logo-dot">LAB</span></div>
  <div class="spinner-wrap"><div class="spinner"></div></div>
  <p>Estamos actualizando tu portal.<br>Te redirigimos al nuevo sitio…</p>
  <a class="btn" href="https://norlab.xyz/portal/">Ir al nuevo portal →</a>
</div>
<script>
  // Redirect inmediato
  setTimeout(function(){
    window.location.replace('https://norlab.xyz/portal/');
  }, 800);
</script>
</body>
</html>
